version: '3.9'

services:

  app:
    build: .
    container_name: demo_app
    expose:
      - "5000"

  nginx:
    image: nginx:latest
    container_name: demo_nginx_proxy
    ports:
      - "8080:80"          
    volumes:
      - /home/uporabnik/NUKS/Vaja3/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
      
      