<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Items CRUD App</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #eef2ff, #f8fafc);
      min-height: 100vh;
      padding: 40px 20px;
      color: #1e293b;
    }

    .container {
      max-width: 800px;
      margin: 0 auto;
      background: white;
      border-radius: 18px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
      padding: 30px;
    }

    h1 {
      margin-top: 0;
      text-align: center;
      font-size: 2rem;
      color: #0f172a;
    }

    .subtitle {
      text-align: center;
      color: #64748b;
      margin-bottom: 30px;
    }

    .form-card {
      display: grid;
      grid-template-columns: 1fr 1fr auto;
      gap: 12px;
      margin-bottom: 30px;
    }

    input {
      padding: 12px 14px;
      border: 1px solid #cbd5e1;
      border-radius: 10px;
      font-size: 1rem;
      outline: none;
      transition: border 0.2s, box-shadow 0.2s;
    }

    input:focus {
      border-color: #6366f1;
      box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.15);
    }

    button {
      border: none;
      border-radius: 10px;
      padding: 10px 14px;
      cursor: pointer;
      font-weight: bold;
      transition: transform 0.15s, opacity 0.15s;
    }

    button:hover {
      transform: translateY(-1px);
      opacity: 0.95;
    }

    .add-btn {
      background: #4f46e5;
      color: white;
      min-width: 120px;
    }

    .item-list {
      list-style: none;
      padding: 0;
      margin: 0;
      display: grid;
      gap: 14px;
    }

    .item-card {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      padding: 18px;
      border: 1px solid #e2e8f0;
      border-radius: 14px;
      background: #f8fafc;
    }

    .item-info {
      flex: 1;
    }

    .item-name {
      font-size: 1.1rem;
      font-weight: bold;
      color: #0f172a;
      margin-bottom: 4px;
    }

    .item-description {
      color: #475569;
    }

    .actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .edit-btn {
      background: #0ea5e9;
      color: white;
    }

    .delete-btn {
      background: #ef4444;
      color: white;
    }

    .empty-state {
      text-align: center;
      color: #64748b;
      padding: 30px 10px;
      border: 2px dashed #cbd5e1;
      border-radius: 14px;
      background: #f8fafc;
    }

    @media (max-width: 700px) {
      .form-card {
        grid-template-columns: 1fr;
      }

      .item-card {
        flex-direction: column;
        align-items: flex-start;
      }

      .actions {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Items CRUD App</h1>
    <p class="subtitle">Manage your items with a cleaner interface</p>

    <div class="form-card">
      <input type="text" id="name" placeholder="Enter item name" />
      <input type="text" id="description" placeholder="Enter description" />
      <button class="add-btn" onclick="createItem()">Add Item</button>
    </div>

    <ul id="item-list" class="item-list"></ul>
  </div>

 <script>
  const API_BASE = "http://localhost:8000/v1";

  async function fetchItems() {
    const res = await fetch(`${API_BASE}/items`);
    const items = await res.json();
    const list = document.getElementById("item-list");
    list.innerHTML = "";

    if (items.length === 0) {
      list.innerHTML = `
        <div class="empty-state">
          No items yet. Add your first item above.
        </div>
      `;
      return;
    }

    items.forEach(item => {
      const li = document.createElement("li");
      li.className = "item-card";
      li.innerHTML = `
        <div class="item-info">
          <div class="item-name">${item.name}</div>
          <div class="item-description">${item.description || "No description"}</div>
        </div>
        <div class="actions">
          <button class="edit-btn" onclick='editItem(${item.id}, ${JSON.stringify(item.name)}, ${JSON.stringify(item.description || "")})'>Edit</button>
          <button class="delete-btn" onclick="deleteItem(${item.id})">Delete</button>
        </div>
      `;
      list.appendChild(li);
    });
  }

  async function createItem() {
    const name = document.getElementById("name").value.trim();
    const description = document.getElementById("description").value.trim();

    if (!name) {
      alert("Item name is required.");
      return;
    }

    await fetch(`${API_BASE}/items/`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ name, description })
    });

    document.getElementById("name").value = "";
    document.getElementById("description").value = "";
    fetchItems();
  }

  async function deleteItem(id) {
    await fetch(`${API_BASE}/items/${id}`, { method: "DELETE" });
    fetchItems();
  }

  function editItem(id, currentName, currentDesc) {
    const newName = prompt("New name:", currentName);
    if (newName === null) return;

    const newDesc = prompt("New description:", currentDesc);
    if (newDesc === null) return;

    updateItem(id, newName, newDesc);
  }

  async function updateItem(id, name, description) {
    await fetch(`${API_BASE}/items/${id}`, {
      method: "PUT",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ name, description })
    });
    fetchItems();
  }

  fetchItems();
</script>
</body>
</html>
